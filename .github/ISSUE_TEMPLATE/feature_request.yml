name: Feature Request
description: Propose a new feature or enhancement for @payai/mercantil-agent-sdk
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable? Be as specific as possible.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? API sketches, code examples, or pseudocode are very helpful.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or consider? Why is this approach preferable?
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before filing this one.
          required: true
