name: Publish API Docs

on:
  push:
    branches: [main]
    paths:
      - "typescript/src/**"

jobs:
  publish:
    name: Generate & sync TSDoc to docs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install SDK dependencies
        run: npm ci
        working-directory: typescript

      - name: Generate API reference (TSDoc → MDX)
        run: npm run docs:generate
        working-directory: typescript

      # Requires a fine-grained PAT with contents:write on PayAINetwork/docs,
      # stored as the DOCS_REPO_PAT secret in this repository's settings.
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: PayAINetwork/docs
          token: ${{ secrets.DOCS_REPO_PAT }}
          path: docs-repo

      - name: Sync generated API reference
        run: |
          rm -rf docs-repo/sdk/api
          cp -r docs-output/sdk/api docs-repo/sdk/api

      - name: Commit and push to docs repo
        working-directory: docs-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/api
          if git diff --cached --quiet; then
            echo "No API doc changes to sync."
          else
            SHA=$(cd .. && git rev-parse --short HEAD)
            git commit -m "chore: sync SDK API reference from agent-payments@${SHA}"
            git push
          fi
